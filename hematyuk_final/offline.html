<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HematYuk! - Offline</title>
  <style>
    body { font-family:'Plus Jakarta Sans',sans-serif; background:#f0fdf4; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .box { text-align:center; padding:40px 20px; }
    .icon { font-size:64px; margin-bottom:16px; }
    h1 { font-size:24px; color:#047857; margin-bottom:8px; }
    p { color:#6b7280; font-size:14px; }
    button { margin-top:24px; padding:12px 28px; background:#059669; color:white; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🌿</div>
    <h1>Kamu Sedang Offline</h1>
    <p>Koneksi internet tidak tersedia.<br>Datamu tetap aman tersimpan lokal.</p>
    <button onclick="location.reload()">🔄 Coba Lagi</button>
  </div>
</body>
</html>
