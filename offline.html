<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - HematYuk!</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #0f172a;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #047857, #10b981);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
      box-shadow: 0 8px 24px rgba(5,150,105,.3);
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #047857;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .icon-big {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #047857, #10b981);
      color: white;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(5,150,105,.3);
    }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌿</div>
    <span class="icon-big">📶</span>
    <h1>Sedang Offline</h1>
    <p>HematYuk! tidak dapat terhubung ke internet saat ini. Periksa koneksi internet Anda dan coba lagi.</p>
    <button class="btn" onclick="window.location.reload()">🔄 Coba Lagi</button>
    <p class="hint">Data lokal Anda tetap aman dan dapat diakses kembali setelah online.</p>
  </div>
  <script>
    // Auto-reload saat koneksi kembali
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
